<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Sign-in screen -->
        <div id="login-screen" class="login-screen">
            <div class="login-card">
                <div class="login-logo">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <h1>Contacts Dashboard</h1>
                <p>Sign in with your organization account to view live data</p>
                <button id="btn-signin" class="btn btn-primary btn-lg" onclick="signIn()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                    Sign in with Microsoft
                </button>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard hidden">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <h1 class="header-title">Contacts Dashboard</h1>
                    <span id="last-updated" class="header-subtitle">Loading...</span>
                </div>
                <div class="header-right">
                    <button class="btn btn-ghost" onclick="refreshData()" title="Refresh data">
                        <svg id="refresh-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"/>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                        </svg>
                    </button>
                    <div class="user-info">
                        <span id="user-name"></span>
                        <button class="btn btn-ghost btn-sm" onclick="signOut()">Sign out</button>
                    </div>
                </div>
            </header>

            <!-- Loading overlay -->
            <div id="loading" class="loading-overlay hidden">
                <div class="spinner"></div>
                <p>Fetching data from SharePoint...</p>
            </div>

            <!-- Error banner -->
            <div id="error-banner" class="error-banner hidden">
                <span id="error-message"></span>
                <button class="btn btn-ghost btn-sm" onclick="hideError()">Dismiss</button>
            </div>

            <!-- Summary cards -->
            <div class="cards-row">
                <div class="card stat-card">
                    <div class="stat-label">Total Contacts</div>
                    <div class="stat-value" id="stat-total">—</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-label">Companies</div>
                    <div class="stat-value" id="stat-companies">—</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-label">With Email</div>
                    <div class="stat-value" id="stat-emails">—</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-label">Unique Roles</div>
                    <div class="stat-value" id="stat-roles">—</div>
                </div>
            </div>

            <!-- Charts row -->
            <div class="charts-row">
                <div class="card chart-card">
                    <h3>Top Companies</h3>
                    <canvas id="chart-companies"></canvas>
                </div>
                <div class="card chart-card">
                    <h3>Contacts by Role</h3>
                    <canvas id="chart-roles"></canvas>
                </div>
            </div>

            <!-- Search and table -->
            <div class="card table-card">
                <div class="table-header">
                    <h3>All Contacts</h3>
                    <div class="table-controls">
                        <input type="text" id="search-input" class="search-input" placeholder="Search contacts..." oninput="filterTable()">
                        <button class="btn btn-secondary" onclick="exportCSV()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            Export CSV
                        </button>
                    </div>
                </div>
                <div class="table-container">
                    <table id="contacts-table">
                        <thead id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
                <div class="table-footer">
                    <span id="table-count">0 contacts</span>
                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
